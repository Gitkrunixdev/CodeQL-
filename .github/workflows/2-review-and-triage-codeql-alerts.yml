name: Step 2, Review and triage CodeQL alerts

# This workflow updates from step 2 to step 3 after reviewing CodeQL alerts.

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CodeQL]
    types:
      - completed

permissions:
  contents: write
  security-events: read

jobs:
  get_current_step:
    name: Check current step number
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
      - id: get_step
        run: |
          echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  review-and-triage:
    name: Review and triage CodeQL alerts
    needs: get_current_step
    if: >-
      ${{ !github.event.repository.is_template
          && needs.get_current_step.outputs.current_step == 2 }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608
        with:
          fetch-depth: 0

      # In README.md, switch step 2 for step 3.
      - name: Update to step 3
        uses: skills/action-update-step@9c1b1a0c5c8a0c6e9f3b7a6d2e4c1a9b8f7e6d5c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 2
