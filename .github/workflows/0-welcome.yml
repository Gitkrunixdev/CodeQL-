name: Welcome

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      # In README.md, switch step 0 for step 1.
      - name: Update to step 1
        uses: skills/action-update-step@9c1b1a0c5c8a0c6e9f3b7a6d2e4c1a9b8f7e6d5c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 0
